<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240" role="img" aria-label="llm-stream-parser — incremental SSE parser for OpenAI / Anthropic LLM streams">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#21d4fd"/>
    </linearGradient>
  </defs>
  <rect width="880" height="240" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="880" height="6" rx="3" fill="url(#accent)"/>
  <text x="48" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" font-weight="700" fill="#e8ecff">llm-stream-parser</text>
  <text x="48" y="132" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#9fb0d8">incremental SSE parsing for OpenAI / Anthropic LLM streams</text>
